<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/action.js"></script>
    <title>GoodPay</title>
</head>

<body>
    <header>
        <section name="navbar" class="menu">
            <nav class="menu">
                <ul class="menu">
                    <li>
                        <a href="#" class="active">
                            <img src="./img/logo-goodpay.png" alt="Logo do site" width="38px" height="38px">
                        </a>
                    </li>
                    <li>
                        <a href="#">Programa</a>
                    </li>
                    <li>
                        <a href="#">EcoMoney</a>
                    </li>
                    <li>
                        <a href="#">Cadastro</a>
                    </li>
                    <li>
                        <a href="#">Notícias</a>
                    </li>
                    <li style="float:right;">
                        <a href="#">Sobre Nós</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <section name="slide-banners">
            <div class="w3-content w3-display-container banner">
                <img class="mySlides" src="./img/banner1.png" style="width: 100%;">
                <img class="mySlides" src="./img/banner2.png" style="width: 100%;">
                <img class="mySlides" src="./img/banner3.png" style="width: 100%;">
                <img class="mySlides" src="./img/banner4.png" style="width: 100%;">
                <div class="w3-center w3-container w3-section w3-large w3-text-white w3-display-bottommiddle" style="width: 100%;">
                    <div class="w3-left w3-hover-text-khaki" onclick="plusDivs(-1)">&#10094;</div>
                    <div class="w3-right w3-hover-text-khaki" onclick="plusDivs(1)">&#10095;</div>
                    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(1)"></span>
                    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(2)"></span>
                    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(3)"></span>
                    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(4)"></span>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <script>
            var slideIndex = 1;
            showDivs(slideIndex);
            
            function plusDivs(n) {
              showDivs(slideIndex += n);
            }
            
            function currentDiv(n) {
              showDivs(slideIndex = n);
            }
            
            function showDivs(n) {
              var i;
              var x = document.getElementsByClassName("mySlides");
              var dots = document.getElementsByClassName("demo");
              if (n > x.length) {slideIndex = 1}
              if (n < 1) {slideIndex = x.length}
              for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";  
              }
              for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" w3-white", "");
              }
              x[slideIndex-1].style.display = "block";  
              dots[slideIndex-1].className += " w3-white";
            }
            </script>
    </footer>
</body>

</html>
